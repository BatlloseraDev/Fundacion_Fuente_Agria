<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fundacion Fuente Agria - Catalogo</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./css.css">
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="./index.html">
      <img src="./logo.png" alt="Catalogo Fundacion Fuente Agria" class="brand-logo">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-lg-3">
        <li class="nav-item">
          <a class="nav-link" href="./index.html">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="./catalogo.html">Catalogo</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="./encargo.html">Pedido por encargo</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="./contacto.html">Contactanos</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-4 my-lg-5">

  <div class="d-flex align-items-end justify-content-between flex-wrap gap-2 mb-3">
    <div>
      <h1 class="section-title h2 mb-1">Catalogo</h1>
      <div class="small-muted">Maqueta con tarjetas y filtros basicos</div>
    </div>
    <div class="d-flex gap-2 flex-wrap">
      <a class="btn btn-outline-primary" href="./admin.html">Administracion</a>
      <a class="btn btn-primary" href="./encargo.html">Pedir por encargo</a>
    </div>
  </div>

  <div class="card p-3 p-lg-4 mb-4">
    <div class="row g-3 align-items-end">
      <div class="col-md-5">
        <label class="form-label fw-semibold">Buscar</label>
        <input id="filtroTexto" class="form-control" placeholder="Ej: cesta, evento, artesanal...">
      </div>
      <div class="col-md-4">
        <label class="form-label fw-semibold">Categoria</label>
        <select id="filtroCategoria" class="form-select">
          <option value="todas" selected>Todas</option>
          <option value="cesta">Cesta</option>
          <option value="evento">Evento</option>
          <option value="artesania">Artesania</option>
          <option value="temporada">Temporada</option>
          <option value="otro">Otro</option>
        </select>
      </div>
      <div class="col-md-3 d-grid">
        <button id="btnAplicar" class="btn btn-outline-primary" type="button">Aplicar filtros</button>
      </div>
    </div>
  </div>

  <!-- aqui se pinta TODO por JS -->
  <div class="row g-3" id="gridProductos"></div>

</main>

<footer class="footer mt-5">
  <div class="container py-4">
    <div class="row g-3 align-items-center">
      <div class="col-md-8">
        <div class="fw-bold">Fundacion Fuente Agria</div>
        <div class="small">
          Proyecto social y solidario. Maqueta web realizada con Bootstrap.
        </div>
      </div>

      <div class="col-md-4 text-md-end">
        <div class="small fw-semibold">Contacto</div>
        <div class="small">contacto@fundacionfuenteagria.org</div>
      </div>
    </div>
  </div>
</footer>

<script>
  const STORAGE_KEY = "ffa_productos_v1";

  const DEFAULT_PRODUCTOS = [
    {
      id: crypto.randomUUID(),
      nombre: "Cesta solidaria",
      categoria: "Cesta",
      descripcion: "Ideal para regalo. Contenido variable segun stock.",
      imagenUrl: "https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=80",
      precioTexto: "Desde 15,00 €",
      estado: "activo",
    },
    {
      id: crypto.randomUUID(),
      nombre: "Detalles para eventos",
      categoria: "Evento",
      descripcion: "Bodas, comuniones, celebraciones. Personalizable.",
      imagenUrl: "https://images.unsplash.com/photo-1528825871115-3581a5387919?auto=format&fit=crop&w=1200&q=80",
      precioTexto: "Consultar",
      estado: "activo",
    },
    {
      id: crypto.randomUUID(),
      nombre: "Producto artesanal",
      categoria: "Artesania",
      descripcion: "Pieza hecha a mano. Variantes por color y tamano.",
      imagenUrl: "https://images.unsplash.com/photo-1520975958225-5a3c0c3c1baf?auto=format&fit=crop&w=1200&q=80",
      precioTexto: "Desde 8,00 €",
      estado: "activo",
    },
  ];

  const el = (id) => document.getElementById(id);

  function ensureStorage(){
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_PRODUCTOS));
      return;
    }
    try{
      const parsed = JSON.parse(raw);
      if(!Array.isArray(parsed)) throw new Error("not array");
    }catch{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_PRODUCTOS));
    }
  }

  function loadProductos(){
    ensureStorage();
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  }

  function badgeCategoria(cat){
    const c = String(cat || "").toLowerCase();
    if(c === "cesta") return '<span class="badge bg-success-subtle text-success mb-2">Cesta</span>';
    if(c === "evento") return '<span class="badge bg-warning-subtle text-warning mb-2">Evento</span>';
    if(c === "artesania") return '<span class="badge bg-secondary-subtle text-secondary mb-2">Artesania</span>';
    if(c === "temporada") return '<span class="badge bg-info-subtle text-info mb-2">Temporada</span>';
    return '<span class="badge bg-light text-dark mb-2">Otro</span>';
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function normalize(str){
    return String(str || "").trim().toLowerCase();
  }

  function aplicaFiltros(productos){
    const texto = normalize(el("filtroTexto").value);
    const cat = normalize(el("filtroCategoria").value);

    return productos.filter(p => (p.estado || "activo") === "activo")
      .filter(p => {
        if(cat === "todas") return true;
        return normalize(p.categoria) === cat;
      })
      .filter(p => {
        if(!texto) return true;
        const hay = normalize(p.nombre) + " " + normalize(p.descripcion) + " " + normalize(p.categoria);
        return hay.includes(texto);
      });
  }

  function renderCatalogo(){
    const grid = el("gridProductos");

    const productos = aplicaFiltros(loadProductos());

    if(productos.length === 0){
      grid.innerHTML = `
        <div class="col-12">
          <div class="alert alert-warning mb-0">
            No hay resultados. Prueba otros filtros o entra a <a href="./admin.html">Administracion</a>.
          </div>
        </div>
      `;
      return;
    }

    grid.innerHTML = productos.map(p => `
      <div class="col-sm-6 col-lg-4">
        <div class="card h-100 overflow-hidden">
          <img
            src="${escapeHtml(p.imagenUrl)}"
            class="w-100"
            style="height: 180px; object-fit: cover;"
            alt="${escapeHtml(p.nombre)}"
            onerror="this.style.display='none'">
          <div class="card-body">
            ${badgeCategoria(p.categoria)}
            <h3 class="h5 fw-bold">${escapeHtml(p.nombre)}</h3>
            <p class="small-muted mb-3">${escapeHtml(p.descripcion)}</p>
            <div class="d-flex justify-content-between align-items-center">
              <span class="fw-bold">${escapeHtml(p.precioTexto || "Consultar")}</span>
              <a class="btn btn-primary btn-sm" href="./encargo.html">Encargar</a>
            </div>
          </div>
        </div>
      </div>
    `).join("");
  }

  el("btnAplicar").addEventListener("click", renderCatalogo);
  el("filtroTexto").addEventListener("input", () => {
    clearTimeout(window.__ffa_t);
    window.__ffa_t = setTimeout(renderCatalogo, 150);
  });
  el("filtroCategoria").addEventListener("change", renderCatalogo);

  renderCatalogo();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
