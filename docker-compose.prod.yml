services:
  # --- BASE DE DATOS (MySQL) ---
  mysql:
    image: mysql:8.0
    container_name: fuenteagria_db_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    volumes:
      - mysql_data_prod:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  # --- BACKEND (NestJS Compilado) ---
  back:
    build:
      context: ./back
      dockerfile: Dockerfile.prod
    container_name: fuenteagria_back_prod
    restart: unless-stopped
    # Sin puertos expuestos. NGINX le enviará tráfico internamente por el puerto 3000.
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_DATABASE: ${MYSQL_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      RESERVATION_HOLIDAYS: ${RESERVATION_HOLIDAYS:-}
    depends_on:
      mysql:
        condition: service_healthy
      ollama-models:
        condition: service_completed_successfully
    networks:
      - app-network

  # --- FRONTEND (Servido de forma estática) ---
  front:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: fuenteagria_front_prod
    restart: unless-stopped
    # Sin puertos expuestos (el puerto 5173 de Vite desaparece en producción).
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    networks:
      - app-network

  # --- NGINX (EL ÚNICO ACCESIBLE DESDE EL EXTERIOR) ---
  nginx:
    image: nginx
    container_name: fuenteagria_nginx_prod
    restart: always
    ports:
      - '80:80'       # HTTP público
      - '443:443'     # HTTPS público 
    volumes:
      - ./nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - back
      - front
    networks:
      - app-network

  # --- OLLAMA (IA Local) ---
  ollama:
    image: ollama/ollama:latest
    container_name: fuenteagria_ollama_prod
    restart: unless-stopped

    volumes:
      - ollama_data_prod:/root/.ollama
    networks:
      - app-network

  # --- MODELOS DE OLLAMA ---
  ollama-models:
    image: ollama/ollama:latest
    container_name: fuenteagria_ollama_models_prod
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    networks:
      - app-network
    command: >
      "
        until ollama list >/dev/null 2>&1; do sleep 2; done;
        ollama pull nomic-embed-text;
        ollama pull qwen2.5:1.5b;
      "

volumes:
  mysql_data_prod:
  ollama_data_prod:

networks:
  app-network:
    driver: bridge