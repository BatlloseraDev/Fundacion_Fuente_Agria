

services:
  # --- BASE DE DATOS (MySQL) ---
  mysql:
    image: mysql:8.0
    container_name: fuenteagria_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - '3360:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  # --- GESTOR DE BD (phpMyAdmin) ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: fuenteagria_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '5050:80' # Mantenemos el puerto 5050 que usabas para pgadmin
    depends_on:
      - mysql
    networks:
      - app-network

  # --- BACKEND (NestJS) ---
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: fuenteagria_back
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Pasamos la URL completa para Prisma
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_DATABASE: ${MYSQL_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    volumes:
      - ./back:/app
    depends_on:
      - mysql
    networks:
      - app-network
    command: sh -c "yarn prisma generate && yarn start:dev"

  # --- FRONTEND (Vite + React) ---
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: fuenteagria_front
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./front:/app
      #- /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app-network
    #user: "${UID:-1000}:${GID:-1000}"
   

  # --- NGINX ---
  nginx:
    image: nginx
    container_name: fuenteagria_nginx
    restart: always
    ports:
      - '8080:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - back
      - front
    networks:
      - app-network

volumes:
  mysql_data:


networks:
  app-network:
    driver: bridge