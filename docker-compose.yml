

services:
  # --- BASE DE DATOS (MySQL) ---
  mysql:
    image: mysql:8.0
    container_name: fuenteagria_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - '3360:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  # --- GESTOR DE BD (phpMyAdmin) ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: fuenteagria_phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - '5050:80' # Mantenemos el puerto 5050 que usabas para pgadmin
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # --- BACKEND (NestJS) ---
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: fuenteagria_back
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Pasamos la URL completa para Prisma
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_DATABASE: ${MYSQL_DATABASE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
    volumes:
      - ./back:/app
      - back_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      ollama-models:
        condition: service_completed_successfully
    networks:
      - app-network
    command: sh -c "yarn install --frozen-lockfile && yarn prisma generate && yarn prisma db push && yarn seed --if-empty && yarn start:dev"

  # --- FRONTEND (Vite + React) ---
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: fuenteagria_front
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./front:/app
      - front_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    networks:
      - app-network
    #user: "${UID:-1000}:${GID:-1000}"
   

  # --- NGINX ---
  nginx:
    image: nginx
    container_name: fuenteagria_nginx
    restart: always
    ports:
      - '8080:80'
      - '8443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      
    depends_on:
      - back
      - front
    networks:
      - app-network

  # --- OLLAMA ---
  ollama:
    image: ollama/ollama:latest
    container_name: fuenteagria_ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network

  # --- MODELOS DE OLLAMA (se descargan solo si faltan) ---
  ollama-models:
    image: ollama/ollama:latest
    container_name: fuenteagria_ollama_models
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    environment:
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      - ollama
    networks:
      - app-network
    command: >
      "
        until ollama list >/dev/null 2>&1; do
          echo 'Esperando a Ollama...';
          sleep 2;
        done;
        ollama pull nomic-embed-text;
        ollama pull qwen2.5:1.5b;
      "

volumes:
  mysql_data:
  ollama_data: # Añadido para persistir los modelos descargados de Ollama
  back_node_modules:
  front_node_modules:


networks:
  app-network:
    driver: bridge
