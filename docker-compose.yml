

services:
  # --- BASE DE DATOS ---
  postgres:
    image: postgres:17
    container_name: fuenteagria_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
   

  # --- GESTOR DE BD ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: fuenteagria_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - app-network
    

  # --- BASE DE DATOS NoSQL (MongoDB) ---
  mongo:
    image: mongo:7.0
    container_name: fuenteagria_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - '27018:27017' # lo he cambiado al 27018 por los que tenemos mongo instalado para que no de problemas
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  # --- GESTOR DE BD NoSQL (Mongo Express) ---
  mongo-express:
    image: mongo-express
    container_name: fuenteagria_mongo_express
    restart: always
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongo
    networks:
      - app-network
 

  # --- BACKEND (NestJS) ---
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: fuenteagria_back
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      # Pasamos la URL completa para Prisma
      DATABASE_URL: ${DATABASE_URL}
      # Pasamos variables individuales por si NestJS las necesita sueltas
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: ${POSTGRES_DB}
    volumes:
      - ./back:/app
      #- /app/node_modules
    depends_on:
      - postgres
    networks:
      - app-network
    #user: "${UID:-1000}:${GID:-1000}"
    command: sh -c " yarn prisma generate && yarn start:dev"

  # --- FRONTEND (Vite + React) ---
  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: fuenteagria_front
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./front:/app
      #- /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app-network
    #user: "${UID:-1000}:${GID:-1000}"
   

  # --- NGINX ---
  nginx:
    image: nginx
    container_name: fuenteagria_nginx
    restart: always
    ports:
      - '8080:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - back
      - front
    networks:
      - app-network

volumes:
  postgres_data:
  mongo_data:


networks:
  app-network:
    driver: bridge