#rate limiting
# limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m; # Desactivado para desarrollo


upstream frontend {
    server front:80;
}

upstream backend {
    server back:3000;
}

# Servidor HTTP para desarrollo (configuraciones de seguridad y HTTPS desactivadas)
server {
    listen 80;
    server_name localhost;
    
    # Bloquea el acceso a cualquier archivo o carpeta que empiece por un punto
    # location ~ /\. {
    #     deny all; # Medida de seguridad para no exponer archivos de configuración (ej: .env, .git)
    # }

    # Redirección a HTTPS desactivada para desarrollo
    # return 301 https://$server_name:8443$request_uri;

    # --- Lógica de proxy movida desde el bloque HTTPS para desarrollo en HTTP ---

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        #Proxy para build
        root /usr/share/nginx/html; # O la ruta de la build de Vite
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        # Cabeceras de seguridad desactivadas para desarrollo
        # proxy_set_header X-Forwarded-Proto https;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    #Configuración para rutas criticas para el rate limiting (desactivado)
    location ~ ^/api/(login|register|auth/login|auth/register)$ {
        # limit_req zone=auth_limit burst=5 nodelay;
        # limit_req_status 429;

        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Cabeceras de seguridad desactivadas para desarrollo
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto $scheme;
    } #TODO: esto devolverá un 429, controlarlo en el front para mostrar un mensaje amigable
    #y cumplir con las politicas de accesibilidad 

    # Configuración para el Backend (NestJS)
    # Todo lo que empiece por /api se irá al backend
    location /api {
        rewrite ^/api/(.*)$ /$1 break; # Elimina el prefijo /api antes de enviarlo a Nest
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        # Cabeceras de seguridad desactivadas para desarrollo
        # proxy_set_header X-Real-IP $remote_addr;
        # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # proxy_set_header X-Forwarded-Proto https;
    }
}

