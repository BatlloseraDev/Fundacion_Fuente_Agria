upstream frontend {
    server front:5173;
}

upstream backend {
    server back:3000;
}

server {
    listen 80;
    
    # Bloquea el acceso a cualquier archivo o carpeta que empiece por un punto
    location ~ /\. {
        deny all;
    }

    # Configuración para el Frontend (Vite)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Configuración para el Backend (NestJS)
    # Todo lo que empiece por /api se irá al backend
    location /api {
        rewrite ^/api/(.*) /$1 break; # Elimina el prefijo /api antes de enviarlo a Nest
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}