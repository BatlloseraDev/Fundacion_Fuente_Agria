#rate limiting
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=3r/m;


upstream frontend {
    server front:5173;
}

upstream backend {
    server back:3000;
}

# Redirige todo HTTP a HTTPS
server {
    listen 80;
    server_name localhost;
    
    # Bloquea el acceso a cualquier archivo o carpeta que empiece por un punto
    location ~ /\. {
        deny all;
    }

    return 301 https://$host$request_uri;
}

# Servidor HTTPS
server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    #Configuración para rutas criticas para el rate limiting
    location ~ ^/api/(login|register|auth/login|auth/register) {
        limit_req zone=auth_limit burst=5 nodelay;

        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    } #TODO: esto devolverá un 503, controlarlo en el front para mostrar un mensaje amigable
    #y cumplir con las politicas de accesibilidad 


    # Configuración para el Backend (NestJS)
    # Todo lo que empiece por /api se irá al backend
    location /api {
        rewrite ^/api/(.*) /$1 break; # Elimina el prefijo /api antes de enviarlo a Nest
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}